name: Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - ".github/scripts/next-ecr-tag.sh"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - ".github/scripts/next-ecr-tag.sh"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirement.txt

      - name: Install dependencies
        run: pip install -r requirement.txt

      - name: Run tests
        run: pytest

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.BACKEND_ECR_REPOSITORY_NAME || 'ayotom-web-prod-backend' }}
      LAMBDA_FUNCTION_NAME: ${{ vars.BACKEND_LAMBDA_FUNCTION_NAME || 'ayotom-web-prod-api' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository and next tag
        id: image
        run: |
          REPO_URL="$(aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY_NAME" \
            --query 'repositories[0].repositoryUri' \
            --output text)"
          IMAGE_TAG="$(bash .github/scripts/next-ecr-tag.sh "$ECR_REPOSITORY_NAME" "$AWS_REGION")"
          echo "repo_url=$REPO_URL" >> "$GITHUB_OUTPUT"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying ${REPO_URL}:${IMAGE_TAG}"

      - name: Login to Amazon ECR
        run: |
          REGISTRY="${{ steps.image.outputs.repo_url }}"
          REGISTRY="${REGISTRY%%/*}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ steps.image.outputs.repo_url }}:${{ steps.image.outputs.tag }}"
          docker build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t "$IMAGE_URI" \
            backend
          docker push "$IMAGE_URI"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "${{ steps.image.outputs.repo_url }}:${{ steps.image.outputs.tag }}"

      - name: Verify Lambda image
        run: |
          ACTUAL="$(aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Code.ImageUri' \
            --output text)"
          if [[ "$ACTUAL" != *":${{ steps.image.outputs.tag }}"* ]]; then
            echo "Expected tag ${{ steps.image.outputs.tag }} in $ACTUAL" >&2
            exit 1
          fi
          echo "Verified $LAMBDA_FUNCTION_NAME -> $ACTUAL"
