name: Deployments

on:
  pull_request:
    paths:
      - "deployments/**"
      - ".github/workflows/deployments.yml"
  push:
    branches:
      - main
    paths:
      - "deployments/**"
      - ".github/workflows/deployments.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TERRAFORM_DIR: deployments/terraform
  TF_VAR_project_name: ${{ secrets.TF_VAR_project_name || 'ayotom-web' }}
  TF_VAR_environment: ${{ secrets.TF_VAR_environment || 'prod' }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
  TF_VAR_hosted_zone_name: ${{ secrets.TF_VAR_hosted_zone_name }}
  TF_VAR_create_route53_records: ${{ secrets.TF_VAR_create_route53_records || 'true' }}
  TF_VAR_api_version: ${{ secrets.TF_VAR_api_version || 'v1' }}
  TF_VAR_lambda_environment_variables: ${{ secrets.TF_VAR_lambda_environment_variables }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt
        run: terraform -chdir="$TERRAFORM_DIR" fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir="$TERRAFORM_DIR" init -input=false

      - name: Terraform validate
        run: terraform -chdir="$TERRAFORM_DIR" validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform -chdir="$TERRAFORM_DIR" plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exitcode=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish plan summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...truncated...' : plan;
            const body = `#### Terraform plan (${{ steps.plan.outputs.exitcode == '0' ? 'success' : 'failed' }})\n<details><summary>Show plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

  apply:
    needs: terraform
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform init
        run: terraform -chdir="$TERRAFORM_DIR" init -input=false

      - name: Terraform apply
        run: terraform -chdir="$TERRAFORM_DIR" apply -auto-approve -input=false
